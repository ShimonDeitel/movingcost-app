name: Movingcost
options:
  bundleIdPrefix: com.shimondeitel.movingcost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Movingcost:
    type: application
    platform: iOS
    sources:
      - path: Movingcost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.movingcost
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Movingcost/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  MovingcostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MovingcostTests
      - path: Movingcost.storekit
    dependencies:
      - target: Movingcost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.movingcost.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  MovingcostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MovingcostUITests
    dependencies:
      - target: Movingcost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.movingcost.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Movingcost:
    build:
      targets:
        Movingcost: all
        MovingcostTests: [test]
        MovingcostUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Movingcost.storekit
    test:
      config: Debug
      storeKitConfiguration: Movingcost.storekit
      targets:
        - MovingcostTests
        - MovingcostUITests
    archive:
      config: Release
